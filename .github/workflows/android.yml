name: Build ARM64 APK

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build ARM64 release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleArm64Release \
            -PtargetArchs=arm64-v8a \
            --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}
          cp android/app/build/outputs/apk/arm64/release/app-arm64-release.apk \
             "photoo-${SHORT_SHA}-arm64.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoo-arm64-apk
          path: photoo-*-arm64.apk
