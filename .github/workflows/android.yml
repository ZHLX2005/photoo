name: Build ARM64 APK

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.11.1

      - name: List available assemble tasks
        run: |
          cd android
          ./gradlew tasks --all 2>&1 | grep -i 'assemble' || true

      - name: Build ARM64 release APK
        run: |
          cd android
          ./gradlew :app:assembleRelease \
            --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then echo "No APK found"; exit 1; fi
          cp "$APK_PATH" "photoo-${SHORT_SHA}-arm64-v8a.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoo-arm64-apk
          path: photoo-*-arm64-v8a.apk
          retention-days: 5
