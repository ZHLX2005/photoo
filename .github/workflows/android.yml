name: Build ARM64 APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Extract version info from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "VERSION_NAME=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build ARM64 release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleArm64Release \
            -PtargetArchs=arm64-v8a \
            -PversionName="${{ steps.version.outputs.VERSION_NAME }}" \
            --no-daemon --stacktrace

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cp android/app/build/outputs/apk/arm64/release/app-arm64-release.apk \
             "photoo-${TAG#v}-arm64.apk"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          files: photoo-${{ steps.version.outputs.VERSION_NAME }}-arm64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
